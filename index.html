<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>公众号文章阅读器</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app">
        <!-- 左侧栏 -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <h2>📰 公众号列表</h2>
                <button class="btn-hit-all" id="btnHitAll" title="查看所有命中关键词的文章">🎯 命中</button>
                <button class="btn-mark-all" id="btnMarkAll" title="全部标记已读">✓ 全部已读</button>
            </div>
            <div class="sidebar-search">
                <input type="text" id="searchInput" placeholder="搜索公众号..." />
            </div>
            <div class="sidebar-list" id="sidebarList">
                <!-- 由 JS 动态生成 -->
                <div class="loading">加载中...</div>
            </div>
        </aside>

        <!-- 右侧主区域 -->
        <main class="content" id="content">
            <div class="welcome">
                <h1>📖 公众号文章阅读器</h1>
                <p>点击左侧公众号查看文章列表</p>
                <p class="stats" id="stats"></p>
            </div>
        </main>
    </div>

    <script src="app.js"></script>
</body>
</html>
